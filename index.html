<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- tailwind and daisyui -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- styles -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        ul#navs-box {
            display: flex;
            list-style: none;
        }

        li.nav-item {
            padding: 8px 12px;
            background-color: white;
            cursor: pointer;
            box-sizing: border-box;
            border-radius: 8px;
            min-width: 80px;
            text-align: center;
            color: gray;
        }

        ul#navs-box li.active {
            background-color: #3B82F6;
            color: white;
        }

        ul#navs-box li:hover {
            background-color: #5695fa;
            color: white;
        }

        .jobs-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
    </style>


    <title>Job Application Tracker</title>
</head>

<body class="w-[450px] sm:w-[1600px] px-[10px] sm:px-[245px] py-[20px] sm:py-[60px] mx-auto bg-gray-100">
    <!-- dashboard section -->
    <section>
        <h1 class="text-[28px] sm:text-[32px] font-bold w-full sm:w-auto">
            Job Application Tracker
        </h1>
        <div id="job-dashboard" class="flex gap-[8px] sm:gap-[16px] mt-[12px] sm:mt-[20px]">
            <div
                class="bg-white rounded-[8px] p-[12px] sm:p-[20px] w-1/3 sm:w-[359px] h-[74px] sm:h-[97px] spacing-y-[4px] sm:spacing-y-[8px] border border-[#F1F2F4]">
                <p class="text-[14px] sm:text-[18px] text-[#323B49]">Total</p>
                <h2 id="count-total" class="text-[20px] sm:text-[31px] font-bold">0</h2>
            </div>
            <div
                class="bg-white rounded-[8px] p-[12px] sm:p-[20px] w-1/3 sm:w-[359px] h-[74px] sm:h-[97px] spacing-y-[4px] sm:spacing-y-[8px] border border-[#F1F2F4]">
                <p class="text-[14px] sm:text-[18px] text-[#323B49]">Interview</p>
                <h2 id="count-interview" class="text-[20px] sm:text-[31px] text-green-500 font-bold">0</h2>
            </div>
            <div
                class="bg-white rounded-[8px] p-[12px] sm:p-[20px] w-1/3 sm:w-[359px] h-[74px] sm:h-[97px] spacing-y-[4px] sm:spacing-y-[8px] border border-[#F1F2F4]">
                <p class="text-[14px] sm:text-[18px] text-[#323B49]">Rejected</p>
                <h2 id="count-rejected" class="text-[20px] sm:text-[31px] text-red-500 font-bold">0</h2>
            </div>
        </div>
    </section>

    <hr class="mt-[20px] sm:mt-[30px] mb-[20px] sm:mb-[30px] border-t-[1px] border-gray-300">
    

    <!-- script link -->
    <script src="script/machine.js"></script>
</body>

</html>
